<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DropLink</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="bg"></div>

<div class="container">

    <header>

        <div class="logo">

            📁

        </div>

        <h1>DropLink</h1>

        <p>

            Secure File Sharing

        </p>

    </header>

    <section class="card">

        <h2 id="title">

            Loading...

        </h2>

        <div id="preview"></div>

        <div class="file-preview">

            <div id="icon">

                📄

            </div>

            <div>

                <h3 id="name">

                    ...

                </h3>

                <small id="size">

                    ...

                </small>

            </div>

        </div>

        <div class="btn-group">

            <a
                id="downloadBtn"
                target="_blank"
            >

                Download

            </a>

        </div>

    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module" src="js/file.js"></script>

</body>

</html>
