<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DropLink</title>

    <meta name="description" content="Upload images and documents. Get a public link instantly.">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="bg"></div>

<div class="container">

    <!-- ===========================
         HEADER
    ============================ -->

    <header>

        <div class="logo">

            📁

        </div>

        <h1>DropLink</h1>

        <p>

            Drag. Drop. Share Instantly.

        </p>

    </header>

    <!-- ===========================
         MAIN CARD
    ============================ -->

    <section class="card">

        <!-- Upload Area -->

        <div
            id="dropArea"
            class="drop-area"
        >

            <input
                id="fileInput"
                type="file"
                hidden
                accept="
                image/png,
                image/jpeg,
                image/webp,
                application/pdf,
                .docx,
                .xlsx
                "
            >

            <div class="icon">

                ☁️

            </div>

            <h2>

                Drag & Drop

            </h2>

            <p>

                or click below

            </p>

            <button
                id="browseBtn"
                type="button"
            >

                Browse Files

            </button>

            <div class="support">

                PNG • JPG • WEBP • PDF • DOCX • XLSX

            </div>

            <div class="support">

                Maximum size: 10 MB

            </div>

        </div>

        <!-- Selected File -->

        <div
            id="selectedBox"
            class="hidden"
        >

            <div class="file-preview">

                <div id="fileIcon">

                    📄

                </div>

                <div>

                    <h3 id="fileName">

                        File

                    </h3>

                    <small id="fileSize">

                        0 MB

                    </small>

                </div>

            </div>

            <button
                id="uploadBtn"
                class="full-btn"
                type="button"
            >

                Upload File

            </button>

        </div>

        <!-- Upload Progress -->

        <div
            id="progressBox"
            class="hidden"
        >

            <h3>

                Uploading...

            </h3>

            <div class="progress">

                <div
                    id="progressBar"
                    class="progress-bar"
                ></div>

            </div>

            <p id="progressText">

                0%

            </p>

        </div>

        <!-- Success -->

        <div
            id="successBox"
            class="hidden"
        >

            <div class="success">

                ✅ Upload Successful

            </div>

            <input
                id="publicLink"
                readonly
            >

            <div class="btn-group">

                <button
                    id="copyBtn"
                    type="button"
                >

                    Copy Link

                </button>

                <a
                    id="openBtn"
                    target="_blank"
                >

                    Open File

                </a>

            </div>

            <button
                id="newUploadBtn"
                class="secondary"
                type="button"
            >

                Upload Another File

            </button>

        </div>

    </section>

    <footer>

        Made with ❤️ using Supabase

    </footer>

</div>

<!-- Toast -->

<div
    id="toast"
    class="toast"
>

    Link Copied!

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module" src="js/upload.js"></script>

</body>

</html>
