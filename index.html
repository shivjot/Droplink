<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DropLink | Drag. Drop. Share.</title>

    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="background"></div>

<div class="container">

    <header>

        <div class="logo">
            📁
        </div>

        <h1>DropLink</h1>

        <p>
            Drag. Drop. Share.
        </p>

    </header>

    <!-- Upload Card -->

    <div class="card">

        <div id="dropArea" class="drop-area">

            <input
                type="file"
                id="fileInput"
                hidden
                accept="
                image/png,
                image/jpeg,
                image/webp,
                application/pdf,
                .docx,
                .xlsx
                "
            >

            <div class="upload-icon">

                ☁️

            </div>

            <h2>
                Drag & Drop File
            </h2>

            <p>
                or click to browse
            </p>

            <button id="browseBtn">
                Browse Files
            </button>

            <small>

                Supported:
                PNG • JPG • WEBP • PDF • DOCX • XLSX

            </small>

            <small>

                Maximum File Size: 10 MB

            </small>

        </div>

    </div>

    <!-- File Info -->

    <div id="fileInfo" class="card hidden">

        <h3>Selected File</h3>

        <div class="file-row">

            <span>Name</span>
            <span id="fileName"></span>

        </div>

        <div class="file-row">

            <span>Size</span>
            <span id="fileSize"></span>

        </div>

        <button id="uploadBtn">

            Upload

        </button>

    </div>

    <!-- Progress -->

    <div id="progressCard" class="card hidden">

        <h3>Uploading...</h3>

        <div class="progress">

            <div
                id="progressBar"
                class="progress-bar"
            ></div>

        </div>

        <p id="progressText">

            0%

        </p>

    </div>

    <!-- Success -->

    <div id="resultCard" class="card hidden">

        <h2>

            ✅ Upload Successful

        </h2>

        <input
            id="publicLink"
            readonly
        >

        <div class="buttons">

            <button id="copyBtn">

                Copy Link

            </button>

            <a
                id="openBtn"
                target="_blank"
            >

                Open

            </a>

        </div>

    </div>

</div>

<!-- Toast -->

<div
    id="toast"
    class="toast"
>

    Link Copied!

</div>

<!-- Scripts -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script type="module" src="js/config.js"></script>

<script type="module" src="js/supabase.js"></script>

<script type="module" src="js/upload.js"></script>

</body>
</html>
